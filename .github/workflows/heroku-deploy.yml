# ---------------------------------------------------------------------------
# GitHub Actions: Build Docker image and push to Heroku Container Registry
# Release is done locally after the push to avoid extra CI deps.
# ---------------------------------------------------------------------------

name: Push Docker to Heroku

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Upstream MediaFlow release tag for the binary'
        required: false
        default: '1.1.1'
        type: string
  push:
    branches: [ main ]

env:
  HEROKU_APP_NAME: agile-fjord-40325

jobs:
  build-and-push:
    name: Build Docker & Push to Heroku Registry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version
        id: version
        run: |
          VERSION="${{ github.event.inputs.release_version || '1.1.1' }}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Heroku Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: ${{ github.repository_owner }}
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.heroku
          platforms: linux/amd64
          push: true
          tags: |
            registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web:latest
            registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web:${{ github.sha }}
          build-args: |
            RELEASE_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web:buildcache
          cache-to: type=registry,ref=registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web:buildcache,mode=max

      - name: Done
        run: |
          echo "Image pushed. Run locally:"
          echo "  heroku container:release web --app ${{ env.HEROKU_APP_NAME }}"
