name: Build & Push Docker to Heroku

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Upstream MediaFlow release tag for the binary'
        required: false
        default: '1.1.1'
        type: string
  push:
    branches: [ main ]

env:
  HEROKU_APP_NAME: agile-fjord-40325

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: echo "VERSION=${{ github.event.inputs.release_version || '1.1.1' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Heroku
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: ${{ github.repository_owner }}
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.heroku
          platforms: linux/amd64
          push: true
          tags: |
            registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web:latest
          build-args: |
            RELEASE_VERSION=${{ steps.version.outputs.VERSION }}
          provenance: false
          sbom: false

      - name: Print release command
        run: |
          echo "Image pushed! To release on Heroku run:"
          echo "  heroku container:release web --app ${{ env.HEROKU_APP_NAME }}"
